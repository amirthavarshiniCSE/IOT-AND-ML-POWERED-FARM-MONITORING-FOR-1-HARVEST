<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Agriculture Monitoring</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
padding:0;
background: linear-gradient(120deg,#3a7bd5,#00d2ff);
color:#333;
}

header{
text-align:center;
color:white;
padding:25px;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
}

.cards{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:15px;
width:180px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card h3{
margin:0;
font-size:16px;
color:#666;
}

.card p{
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#2c3e50;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

th{
background:#2ecc71;
color:white;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.alert{
color:#e74c3c;
font-weight:bold;
}

.normal{
color:#27ae60;
font-weight:bold;
}

footer{
text-align:center;
color:white;
padding:15px;
margin-top:20px;
font-size:14px;
}

</style>
</head>


<body>

<header>
🌱 Smart Agriculture Monitoring Dashboard
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Temperature</h3>
<p id="temp">-- °C</p>
</div>

<div class="card">
<h3>Humidity</h3>
<p id="humidity">-- %</p>
</div>

<div class="card">
<h3>Rain Probability</h3>
<p id="rain">-- %</p>
</div>

</div>


<table id="farmTable">

<tr>
<th>Time</th>
<th>pH</th>
<th>N</th>
<th>P</th>
<th>K</th>
<th>Dust</th>
<th>Moisture</th>
<th>Recommendation</th>
</tr>

</table>

</div>


<footer>
Smart Farm Decision Support System
</footer>


<script>

function loadData(){

fetch("recommendation.json")
.then(response => response.json())
.then(data => {

let table = document.getElementById("farmTable")

table.innerHTML = `
<tr>
<th>Time</th>
<th>pH</th>
<th>N</th>
<th>P</th>
<th>K</th>
<th>Dust</th>
<th>Moisture</th>
<th>Recommendation</th>
</tr>
`

data.forEach(row => {

let recClass = row.Recommendation.includes("⚠") ? "alert" : "normal"

let tr = document.createElement("tr")

tr.innerHTML = `
<td>${row.Time}</td>
<td>${row.pH}</td>
<td>${row.Nitrogen}</td>
<td>${row.Phosphorous}</td>
<td>${row.Potassium}</td>
<td>${row.Dust}</td>
<td>${row.Moisture}</td>
<td class="${recClass}">${row.Recommendation}</td>
`

table.appendChild(tr)

})

document.getElementById("temp").innerText = data[0].Temperature + " °C"
document.getElementById("humidity").innerText = data[0].Humidity + " %"
document.getElementById("rain").innerText = data[0].RainProbability + " %"

})

}

loadData()

setInterval(loadData,5000)

</script>

</body>
</html>
